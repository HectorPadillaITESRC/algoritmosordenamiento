
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; min-height: 100vh; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; text-align: center; }
h1 { margin-bottom: 30px; font-size: 2em; }
.array-display { display: flex; justify-content: center; gap: 15px; margin: 40px 0; flex-wrap: wrap; }
.number-box { width: 80px; height: 80px; border: 3px solid white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; transition: all 0.5s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
.number-box.normal { background: #4CAF50; transform: scale(1); }
.number-box.comparing { background: #ff9800; transform: scale(1.2); box-shadow: 0 0 25px #ff9800; }
.number-box.swapping { background: #f44336; transform: scale(1.2); box-shadow: 0 0 25px #f44336; }
.number-box.sorted { background: #2196F3; transform: scale(1.1); }
.number-box.pivot { background: #9c27b0; transform: scale(1.2); box-shadow: 0 0 25px #9c27b0; }
.controls { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
button, select { padding: 12px 20px; border: none; border-radius: 8px; background: #4CAF50; color: white; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; }
button:hover { background: #45a049; transform: translateY(-2px); }
button:disabled { background: #888; cursor: not-allowed; transform: none; }
select:disabled { background: #888; cursor: not-allowed; }
.speed-control { margin: 25px 0; font-size: 1.1em; }
.speed-control input { width: 300px; margin: 0 15px; }
.info-panel { display: flex; justify-content: space-around; margin: 30px 0; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; font-size: 1.1em; }
.info-panel p { font-weight: bold; }
.explanation { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; line-height: 1.6; margin-top: 30px; font-size: 1.1em; }
.current-step { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="container">
<h1>🔢 Visualizador de Algoritmos de Ordenamiento</h1>
<div class="current-step" id="currentStep">Haz clic en "Nuevos Números" para comenzar</div>
<div class="array-display" id="arrayDisplay"></div>
<div class="controls">
  <button id="generateArray">Nuevos Números</button>
  <select id="algorithmSelect">
    <option value="bubbleSort">Bubble Sort</option>
    <option value="selectionSort">Selection Sort</option>
    <option value="insertionSort">Insertion Sort</option>
  </select>
  <button id="startSort">Ordenar</button>
  <button id="stepByStep">Paso a Paso</button>
  <button id="resetSort">Reiniciar</button>
</div>
<div class="speed-control">
  <label>Velocidad: <span id="speedValue">MUY LENTO</span></label>
  <input type="range" id="speedSlider" min="1" max="5" value="1">
</div>
<div class="info-panel">
  <p>Comparaciones: <span id="comparisons">0</span></p>
  <p>Intercambios: <span id="swaps">0</span></p>
  <p>Pasos: <span id="steps">0</span></p>
</div>
<div class="explanation">
  <h3>¿Cómo funciona?</h3>
  <p id="algorithmExplanation">Selecciona un algoritmo y haz clic en Ordenar para ver cómo se ordenan los números.</p>
</div>
</div>

<script>
class SortingVisualizer {
  constructor() {
    this.array = [];
    this.originalArray = [];
    this.isSorting = false;
    this.speed = 1000;
    this.comparisons = 0;
    this.swaps = 0;
    this.steps = 0;
    this.stepByStepMode = false;
    this.waitingForStep = false;
    this.sortAborted = false;
    this.initializeEventListeners();
    this.generateNewArray();
  }

  initializeEventListeners() {
    document.getElementById('generateArray').addEventListener('click', () => {
      this.abortSort();
      this.generateNewArray();
    });
    document.getElementById('startSort').addEventListener('click', () => {
      if (this.isSorting) return;
      this.stepByStepMode = false;
      this.startSorting();
    });
    document.getElementById('stepByStep').addEventListener('click', () => {
      if (this.isSorting) {
        if (this.waitingForStep) this.waitingForStep = false;
        return;
      }
      this.stepByStepMode = true;
      this.startSorting();
    });
    document.getElementById('resetSort').addEventListener('click', () => {
      this.abortSort();
      setTimeout(() => this.resetArray(), 50);
    });
    document.getElementById('speedSlider').addEventListener('input', (e) => {
      const speeds = [1500, 1000, 500, 200, 50];
      const labels = ['MUY LENTO', 'LENTO', 'NORMAL', 'RÁPIDO', 'MUY RÁPIDO'];
      this.speed = speeds[e.target.value - 1];
      document.getElementById('speedValue').textContent = labels[e.target.value - 1];
    });
    document.getElementById('algorithmSelect').addEventListener('change', (e) => {
      this.updateAlgorithmExplanation(e.target.value);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && this.waitingForStep) {
        e.preventDefault();
        this.waitingForStep = false;
      }
    });
  }

  abortSort() {
    this.sortAborted = true;
    this.waitingForStep = false;
    this.isSorting = false;
  }

  generateNewArray() {
    this.array = Array.from({length: 10}, () => Math.floor(Math.random() * 99) + 1);
    this.originalArray = [...this.array];
    this.renderArray();
    this.resetStats();
    this.updateAlgorithmExplanation(document.getElementById('algorithmSelect').value);
    this.updateStepMessage("Nuevos números generados. Selecciona un algoritmo y haz clic en Ordenar.");
  }

  renderArray() {
    const container = document.getElementById('arrayDisplay');
    container.innerHTML = '';
    this.array.forEach((value, index) => {
      const box = document.createElement('div');
      box.className = 'number-box normal';
      box.textContent = value;
      box.id = `box-${index}`;
      container.appendChild(box);
    });
  }

  resetArray() {
    this.array = [...this.originalArray];
    this.renderArray();
    this.resetStats();
    this.isSorting = false;
    this.sortAborted = false;
    this.updateStepMessage("Array reiniciado a su estado original.");
  }

  setButtonsDisabled(disabled) {
    ['generateArray', 'startSort', 'resetSort'].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
    document.getElementById('algorithmSelect').disabled = disabled;
    document.getElementById('stepByStep').textContent = disabled ? 'Siguiente Paso' : 'Paso a Paso';
  }

  async startSorting() {
    this.isSorting = true;
    this.sortAborted = false;
    this.steps = 0;
    this.updateStats();
    this.setButtonsDisabled(true);

    const algorithm = document.getElementById('algorithmSelect').value;
    switch(algorithm) {
      case 'bubbleSort':    await this.bubbleSort(); break;
      case 'selectionSort': await this.selectionSort(); break;
      case 'insertionSort': await this.insertionSort(); break;
    }

    if (!this.sortAborted) {
      this.markAllAsSorted();
      this.updateStepMessage("¡Ordenamiento completado!");
    }
    this.isSorting = false;
    this.setButtonsDisabled(false);
  }

  async bubbleSort() {
    const n = this.array.length;
    this.updateStepMessage("Iniciando Bubble Sort...");
    await this.delay(); if (this.sortAborted) return;

    for (let i = 0; i < n - 1; i++) {
      this.updateStepMessage(`Pasada ${i + 1} de ${n - 1}`);
      await this.delay(); if (this.sortAborted) return;

      for (let j = 0; j < n - i - 1; j++) {
        this.steps++; this.comparisons++; this.updateStats();
        this.updateStepMessage(`Comparando posición ${j} (${this.array[j]}) con posición ${j+1} (${this.array[j+1]})`);
        this.highlightBoxes([j, j+1], 'comparing');
        await this.delay(); if (this.sortAborted) return;

        if (this.array[j] > this.array[j+1]) {
          this.updateStepMessage(`¡${this.array[j]} > ${this.array[j+1]}! Necesitan intercambiarse`);
          this.highlightBoxes([j, j+1], 'swapping');
          await this.delay(); if (this.sortAborted) return;
          [this.array[j], this.array[j+1]] = [this.array[j+1], this.array[j]];
          this.swaps++; this.updateStats();
          this.updateStepMessage(`Intercambiados correctamente`);
          this.renderArray(); this.highlightBoxes([j, j+1], 'swapping');
          await this.delay(); if (this.sortAborted) return;
        } else {
          this.updateStepMessage(`${this.array[j]} ≤ ${this.array[j+1]}. No se intercambian`);
          await this.delay(); if (this.sortAborted) return;
        }
        this.highlightBoxes([j, j+1], 'normal');
      }
      this.markAsSorted(n - i - 1);
      this.updateStepMessage(`Posición ${n-i-1} está en su lugar correcto`);
      await this.delay(); if (this.sortAborted) return;
    }
    this.markAsSorted(0);
  }

  async selectionSort() {
    const n = this.array.length;
    this.updateStepMessage("Iniciando Selection Sort...");
    await this.delay(); if (this.sortAborted) return;

    for (let i = 0; i < n - 1; i++) {
      let minIndex = i;
      this.updateStepMessage(`Buscando el mínimo desde la posición ${i}`);
      this.highlightBoxes([i], 'comparing');
      await this.delay(); if (this.sortAborted) return;

      for (let j = i + 1; j < n; j++) {
        this.steps++; this.comparisons++; this.updateStats();
        this.updateStepMessage(`Comparando ${this.array[minIndex]} (mínimo actual) con ${this.array[j]}`);
        this.highlightBoxes([minIndex, j], 'comparing');
        await this.delay(); if (this.sortAborted) return;

        if (this.array[j] < this.array[minIndex]) {
          this.updateStepMessage(`¡${this.array[j]} es menor! Nuevo mínimo encontrado`);
          this.removeHighlight([minIndex]);
          minIndex = j;
          this.highlightBoxes([minIndex], 'comparing');
          await this.delay(); if (this.sortAborted) return;
        } else {
          this.removeHighlight([j]);
        }
      }

      if (minIndex !== i) {
        this.updateStepMessage(`Intercambiando ${this.array[i]} con el mínimo ${this.array[minIndex]}`);
        this.highlightBoxes([i, minIndex], 'swapping');
        await this.delay(); if (this.sortAborted) return;
        [this.array[i], this.array[minIndex]] = [this.array[minIndex], this.array[i]];
        this.swaps++; this.updateStats();
        this.renderArray();
        this.highlightBoxes([i, minIndex], 'swapping');
        await this.delay(); if (this.sortAborted) return;
      } else {
        this.updateStepMessage(`El mínimo ya está en la posición correcta`);
        await this.delay(); if (this.sortAborted) return;
      }
      this.markAsSorted(i);
    }
    this.markAsSorted(n - 1);
  }

  async insertionSort() {
    const n = this.array.length;
    this.updateStepMessage("Iniciando Insertion Sort...");
    await this.delay(); if (this.sortAborted) return;

    this.markAsSorted(0);
    this.updateStepMessage("El primer elemento ya forma la parte ordenada.");
    await this.delay(); if (this.sortAborted) return;

    for (let i = 1; i < n; i++) {
      const key = this.array[i];
      this.updateStepMessage(`Tomando el elemento ${key} (posición ${i}) para insertarlo en la parte ordenada`);
      this.highlightBoxes([i], 'pivot');
      await this.delay(); if (this.sortAborted) return;

      let j = i - 1;
      while (j >= 0 && this.array[j] > key) {
        this.steps++; this.comparisons++; this.updateStats();
        this.updateStepMessage(`${this.array[j]} > ${key}: desplazando ${this.array[j]} a la derecha`);
        this.highlightBoxes([j, j+1], 'comparing');
        await this.delay(); if (this.sortAborted) return;

        this.array[j + 1] = this.array[j];
        this.swaps++; this.updateStats();
        this.renderArray();
        this.highlightBoxes([j+1], 'swapping');
        this.highlightBoxes([j], 'comparing');
        await this.delay(); if (this.sortAborted) return;
        j--;
      }

      this.steps++; this.comparisons++; this.updateStats();
      this.array[j + 1] = key;
      this.updateStepMessage(`Insertando ${key} en la posición ${j+1}`);
      this.renderArray();
      this.highlightBoxes([j+1], 'swapping');
      await this.delay(); if (this.sortAborted) return;

      for (let k = 0; k <= i; k++) this.markAsSorted(k);
      this.updateStepMessage(`Parte ordenada ahora incluye posiciones 0 a ${i}`);
      await this.delay(); if (this.sortAborted) return;
    }
  }

  async delay() {
    if (this.stepByStepMode) {
      const baseMsg = document.getElementById('currentStep').textContent
        .replace(' — Presiona ESPACIO o "Siguiente Paso"', '');
      this.updateStepMessage(baseMsg + ' — Presiona ESPACIO o "Siguiente Paso"');
      this.waitingForStep = true;
      while (this.waitingForStep && !this.sortAborted) {
        await new Promise(resolve => setTimeout(resolve, 100));
      }
    } else {
      return new Promise(resolve => setTimeout(resolve, this.speed));
    }
  }

  highlightBoxes(indices, className) {
    indices.forEach(index => {
      const box = document.getElementById(`box-${index}`);
      if (box) box.className = `number-box ${className}`;
    });
  }

  removeHighlight(indices) {
    indices.forEach(index => {
      const box = document.getElementById(`box-${index}`);
      if (box) box.className = 'number-box normal';
    });
  }

  markAsSorted(index) {
    const box = document.getElementById(`box-${index}`);
    if (box) box.className = 'number-box sorted';
  }

  markAllAsSorted() {
    for (let i = 0; i < this.array.length; i++) this.markAsSorted(i);
  }

  updateStats() {
    document.getElementById('comparisons').textContent = this.comparisons;
    document.getElementById('swaps').textContent = this.swaps;
    document.getElementById('steps').textContent = this.steps;
  }

  resetStats() {
    this.comparisons = 0; this.swaps = 0; this.steps = 0;
    this.updateStats();
  }

  updateStepMessage(message) {
    document.getElementById('currentStep').textContent = message;
  }

  updateAlgorithmExplanation(algorithm) {
    const explanations = {
      bubbleSort: "BUBBLE SORT: Compara elementos adyacentes y los intercambia si están en orden incorrecto. Repite hasta que la lista esté ordenada. Simple pero ineficiente para listas grandes. Complejidad: O(n²).",
      selectionSort: "SELECTION SORT: Encuentra el elemento más pequeño y lo coloca al inicio. Luego el siguiente más pequeño en segunda posición, y así sucesivamente. Complejidad: O(n²).",
      insertionSort: "INSERTION SORT: Construye la lista ordenada un elemento a la vez. Toma cada elemento y lo inserta en la posición correcta dentro de la parte ya ordenada (marcada en azul). El elemento activo se muestra en morado. Complejidad: O(n²), pero muy eficiente para listas casi ordenadas."
    };
    document.getElementById('algorithmExplanation').textContent = explanations[algorithm] || '';
  }
}

document.addEventListener('DOMContentLoaded', () => { new SortingVisualizer(); });
</script>
</body>
</html>
